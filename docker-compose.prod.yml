services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quorum
      POSTGRES_USER: quorum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorum"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://quorum:${POSTGRES_PASSWORD}@postgres:5432/quorum
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://paperpilotapp.com}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-wss://paperpilotapp.com}
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTPS router
      - "traefik.http.routers.paperpilot.rule=Host(`paperpilotapp.com`) || Host(`www.paperpilotapp.com`)"
      - "traefik.http.routers.paperpilot.entrypoints=websecure"
      - "traefik.http.routers.paperpilot.tls=true"
      - "traefik.http.routers.paperpilot.tls.certresolver=letsencrypt"
      - "traefik.http.services.paperpilot.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.paperpilot-http.rule=Host(`paperpilotapp.com`) || Host(`www.paperpilotapp.com`)"
      - "traefik.http.routers.paperpilot-http.entrypoints=web"
      - "traefik.http.routers.paperpilot-http.middlewares=paperpilot-https"
      - "traefik.http.middlewares.paperpilot-https.redirectscheme.scheme=https"
    networks:
      - default
      - coolify
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  default:
  coolify:
    external: true
