name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export APP_DIR="/opt/quorum"
            export REPO_URL="https://github.com/ThirunagariHarish/Quorum.git"

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Clone or pull
            if [ ! -d "$APP_DIR" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main
            fi

            cd "$APP_DIR"

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found in $APP_DIR"
              exit 1
            fi

            # Build and start PaperPilot containers
            docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d

            echo ">> Containers started:"
            docker compose -f docker-compose.prod.yml ps

            # Write Traefik file-based routing config
            # Traefik (running as Docker container) must reach Caddy via host bridge IP
            HOST_GW=$(docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}' 2>/dev/null || echo "172.17.0.1")
            echo ">> Host bridge gateway: $HOST_GW"

            for DIR in /data/proxy/dynamic /etc/traefik/dynamic /opt/traefik/dynamic; do
              if [ -d "$DIR" ]; then
                TRAEFIK_DYNAMIC_DIR="$DIR"
                break
              fi
            done

            if [ -n "${TRAEFIK_DYNAMIC_DIR:-}" ]; then
              cat > "$TRAEFIK_DYNAMIC_DIR/paperpilot.yml" << EOF
            http:
              routers:
                paperpilot-https:
                  rule: "Host(\`paperpilotapp.com\`) || Host(\`www.paperpilotapp.com\`)"
                  entryPoints:
                    - websecure
                  service: paperpilot-svc
                  tls:
                    certResolver: letsencrypt
                paperpilot-http:
                  rule: "Host(\`paperpilotapp.com\`) || Host(\`www.paperpilotapp.com\`)"
                  entryPoints:
                    - web
                  middlewares:
                    - paperpilot-https-redirect
                  service: paperpilot-svc
              middlewares:
                paperpilot-https-redirect:
                  redirectScheme:
                    scheme: https
                    permanent: true
              services:
                paperpilot-svc:
                  loadBalancer:
                    servers:
                      - url: "http://${HOST_GW}:8080"
            EOF
              echo ">> Traefik config written to $TRAEFIK_DYNAMIC_DIR/paperpilot.yml (backend: http://${HOST_GW}:8080)"
            else
              echo ">> WARNING: No Traefik dynamic config dir found. Checked: /data/proxy/dynamic, /etc/traefik/dynamic, /opt/traefik/dynamic"
              echo ">> Listing /data/proxy if it exists:"
              ls /data/proxy/ 2>/dev/null || echo "   (not found)"
              echo ">> Listing /etc/traefik if it exists:"
              ls /etc/traefik/ 2>/dev/null || echo "   (not found)"
            fi

            # Health check: Caddy on :8080, then via Traefik on :80
            sleep 10
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo ">> Caddy health check PASSED on :8080"
            else
              echo ">> WARNING: Caddy not responding on :8080"
              docker compose -f docker-compose.prod.yml logs --tail=20 caddy backend
            fi

            # Cleanup
            docker image prune -f
