name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export APP_DIR="/opt/quorum"
            export REPO_URL="https://github.com/ThirunagariHarish/Quorum.git"

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Clone or pull
            if [ ! -d "$APP_DIR" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main
            fi

            cd "$APP_DIR"

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found in $APP_DIR"
              exit 1
            fi

            # Free ports 80 and 443 — stop any Docker container or system process using them
            echo ">> Freeing ports 80 and 443..."
            for port in 80 443; do
              CID=$(docker ps --format "{{.Ports}} {{.ID}}" | awk -v p=":${port}->" '$0 ~ p {print $NF}')
              if [ -n "$CID" ]; then
                CNAME=$(docker inspect --format "{{.Name}}" "$CID" | tr -d '/')
                echo ">> Stopping Docker container on port $port: $CNAME ($CID)"
                docker stop "$CID" || true
              fi
              fuser -k "${port}/tcp" 2>/dev/null && echo ">> Killed system process on port $port" || true
            done

            # Build and start PaperPilot containers
            docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d

            echo ">> Containers started:"
            docker compose -f docker-compose.prod.yml ps

            # Health check: Caddy on :80, then check TLS status
            sleep 30
            if curl -sf http://localhost/api/v1/health > /dev/null 2>&1; then
              echo ">> HTTP health check PASSED"
            else
              echo ">> WARNING: HTTP health check failed"
              docker compose -f docker-compose.prod.yml logs --tail=20 caddy backend
            fi

            echo ">> Caddy TLS/cert log (last 30 lines):"
            docker compose -f docker-compose.prod.yml logs --tail=30 caddy 2>&1 | grep -E "(tls|cert|acme|https|error|obtain|renew|Error)" || echo "   (no TLS log entries yet)"

            echo ">> Port 443 reachable test:"
            curl -sk --max-time 5 https://localhost/api/v1/health > /dev/null 2>&1 && echo "   HTTPS OK" || echo "   HTTPS not yet ready (cert may still be issuing)"

            # Cleanup
            docker image prune -f
