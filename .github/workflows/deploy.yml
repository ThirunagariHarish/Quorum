name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export APP_DIR="/opt/quorum"
            export REPO_URL="https://github.com/ThirunagariHarish/Quorum.git"

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
            fi

            # Clone or pull
            if [ ! -d "$APP_DIR" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main
            fi

            cd "$APP_DIR"

            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found in $APP_DIR"
              exit 1
            fi

            # Ensure the shared Traefik network exists
            docker network create traefik 2>/dev/null || echo ">> traefik network already exists"

            # Build and start PaperPilot containers
            docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d

            echo ">> Containers started:"
            docker compose -f docker-compose.prod.yml ps

            # Wait and health check (Traefik routes 80/443 → Caddy:80)
            sleep 15
            if curl -sf http://localhost:80/api/v1/health > /dev/null 2>&1; then
              echo ">> Health check PASSED on :80"
            else
              echo ">> Health check via Traefik pending (cert may still be issuing)."
              echo ">> Checking Caddy is up internally..."
              docker compose -f docker-compose.prod.yml logs --tail=20 caddy backend
            fi

            # Cleanup
            docker image prune -f
